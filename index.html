<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema IA - Jose Alfredo B.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #03080f; --card: rgba(13, 17, 23, 0.98); --accent: #00f2ff; --text: #c9d1d9; --panel: #161b22;
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--bg); color: var(--text); }
        #canvasMatrix { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { 
            background: var(--card); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 15px; width: 95%; max-width: 900px; 
            border: 1px solid #30363d; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        /* DISEÑO EXTRACTOR ACTUALIZADO */
        .layout-extractor { display: flex; gap: 30px; align-items: flex-start; }
        
        /* Reloj dentro del círculo */
        .col-reloj { flex: 0 0 180px; text-align: center; position: relative; }
        .wrapper-reloj { position: relative; width: 140px; height: 140px; margin: 0 auto; }
        #hora-digital { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--accent); font-weight: bold; font-size: 1.1rem; font-family: monospace;
        }

        /* Calendario estético */
        #calendario-mini { 
            margin-top: 20px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; border: 1px solid #333;
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; font-size: 0.65rem;
        }
        .dia-actual { background: var(--accent); color: #000; border-radius: 50%; font-weight: bold; padding: 2px; }

        /* Resultados Horizontales */
        .col-main { flex: 1; display: flex; flex-direction: column; }
        #outputRes { 
            width: 100%; height: 100px; padding: 12px; border-radius: 8px; border: 1px solid #238636; 
            background: #010409; color: #aff5b4; font-family: monospace; font-size: 0.9rem;
            display: flex; flex-wrap: wrap; gap: 10px; overflow-y: auto; align-content: flex-start;
        }
        .codigo-tag { background: rgba(35, 134, 54, 0.2); border: 1px solid #238636; padding: 2px 8px; border-radius: 4px; display: inline-block; }

        textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: var(--accent); font-family: monospace; resize: none; margin-bottom: 15px; }
        button { width: 100%; background: #007bff; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-copy { background: #238636; margin-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="canvasMatrix"></canvas>

    <div id="entorno-trabajo" class="container">
        <h3 style="color: var(--accent); text-align:center; margin-bottom: 25px;">Extractor de Código Kohl's</h3>
        
        <div class="layout-extractor">
            <div class="col-reloj">
                <div class="wrapper-reloj">
                    <canvas id="canvasReloj" width="140" height="140"></canvas>
                    <div id="hora-digital">00:00:00</div>
                </div>
                
                <div id="calendario-mini">
                    <b style="grid-column: span 7; color: var(--accent); margin-bottom:5px;">Abril 2026</b>
                    <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
                    ${generarDias()}
                </div>
            </div>

            <div class="col-main">
                <textarea id="inputCodigo" placeholder="Pega los códigos aquí..." style="height: 120px;" oninput="revisarInput()"></textarea>
                <button id="btn-extraer" class="hidden" onclick="procesar()">Extraer Código</button>
                
                <div id="res-box" class="hidden">
                    <p style="font-size: 0.8rem; color: var(--accent); margin: 15px 0 5px;">Códigos Procesados:</p>
                    <div id="outputRes"></div>
                    <button class="btn-copy" onclick="copiarLimpiar()">
                        <i class="fa-brands fa-whatsapp"></i> Copiar y Limpiar Todo
                    </button>
                </div>
            </div>
        </div>
        <button style="background:#30363d; margin-top:20px;" onclick="location.reload()">Volver al Menú Principal</button>
    </div>

    <script>
        function generarDias() {
            let html = "";
            for(let i=1; i<=30; i++) html += `<span class="${i===13?'dia-actual':''}">${i}</span>`;
            return html;
        }
        document.getElementById('calendario-mini').innerHTML = `
            <b style="grid-column: span 7; color: var(--accent); margin-bottom:5px;">Abril 2026</b>
            <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
            ${generarDias()}`;

        function revisarInput() {
            document.getElementById('btn-extraer').classList.toggle('hidden', document.getElementById('inputCodigo').value.trim() === "");
        }

        function procesar() {
            const input = document.getElementById('inputCodigo').value;
            const lineas = input.split('\n');
            const contenedor = document.getElementById('outputRes');
            contenedor.innerHTML = "";
            
            lineas.forEach(l => {
                if(l.trim().length >= 8) {
                    const cod = l.trim().slice(-8);
                    contenedor.innerHTML += `<span class="codigo-tag">${cod}</span> `;
                }
            });
            document.getElementById('res-box').classList.remove('hidden');
        }

        function copiarLimpiar() {
            const tags = document.querySelectorAll('.codigo-tag');
            let texto = Array.from(tags).map(t => t.innerText).join(' ');
            navigator.clipboard.writeText(texto);
            document.getElementById('inputCodigo').value = "";
            document.getElementById('res-box').classList.add('hidden');
            document.getElementById('btn-extraer').classList.add('hidden');
            alert("Copiado en formato horizontal.");
        }

        function iniciarReloj() {
            const ctx = document.getElementById('canvasReloj').getContext('2d');
            setInterval(() => {
                const ahora = new Date();
                ctx.clearRect(0,0,140,140);
                ctx.beginPath(); ctx.arc(70,70,65,0,2*Math.PI); ctx.strokeStyle="#161b22"; ctx.lineWidth=8; ctx.stroke();
                
                let h = ahora.getHours() + ahora.getMinutes()/60;
                let pct = (h - 8) / 9; // Jornada 8am-5pm
                ctx.beginPath(); ctx.arc(70,70,65, -Math.PI/2, -Math.PI/2 + 2*Math.PI*Math.min(Math.max(pct,0),1));
                ctx.strokeStyle="#00f2ff"; ctx.lineCap="round"; ctx.stroke();
                
                document.getElementById('hora-digital').innerText = ahora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            }, 1000);
        }
        iniciarReloj();

        // Efecto Matrix Fondo
        const m = document.getElementById("canvasMatrix"); const mctx = m.getContext("2d");
        function rz() { m.width = window.innerWidth; m.height = window.innerHeight; }
        window.onresize = rz; rz();
        const cols = Array(Math.floor(m.width/15)).fill(1);
        function dr() {
            mctx.fillStyle = "rgba(3, 8, 15, 0.15)"; mctx.fillRect(0,0,m.width,m.height);
            mctx.fillStyle = "#00f2ff22"; mctx.font = "15px monospace";
            cols.forEach((y, i) => {
                mctx.fillText("01"[Math.floor(Math.random()*2)], i*15, y*15);
                if(y*15 > m.height && Math.random() > 0.975) cols[i] = 0;
                cols[i]++;
            });
        }
        setInterval(dr, 50);
    </script>
</body>
</html>

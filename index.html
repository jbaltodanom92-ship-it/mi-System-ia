<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor Profesional de Código</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a1929; --card: rgba(22, 27, 34, 0.9); --accent: #007bff; --text: #c9d1d9; --warn: #ffca28; --futuristic: #00f2ff;
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--bg); color: var(--text); }
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; background: var(--bg); }
        .container { 
            background: var(--card); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; 
            text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.2); 
            border: 1px solid #30363d;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        #entorno-trabajo { max-width: 850px; }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; padding: 20px; width: 95%; max-width: 800px; margin: 80px auto 0 auto;
        }
        .tile {
            background: rgba(31, 41, 55, 0.8); backdrop-filter: blur(5px);
            border-left: 4px solid var(--futuristic); border-radius: 8px; padding: 20px; 
            color: #fff; text-align: left; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .tile:hover { transform: translateX(5px); background: #2d3748; box-shadow: 0 0 15px var(--futuristic); }
        .tile i { font-size: 1.5rem; color: var(--futuristic); margin-bottom: 10px; display: block; }
        .tile span { font-size: 0.9rem; font-weight: bold; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; text-align: center; }
        button { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .badge-cumple { background: #238636; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="login-flow" class="container">
        <h2 style="color: var(--futuristic)">LOGIN IA</h2>
        <div id="asistente-ia">IA: Por favor, escribe tu nombre de usuario.</div>
        <div id="step-user">
            <input type="text" id="user-input" placeholder="Usuario" oninput="validarUser(this.value)">
            <button id="btn-next-user" class="hidden" onclick="irAlPin()">Siguiente</button>
        </div>
        <div id="step-pin" class="hidden">
            <input type="password" id="pin-input" placeholder="Introduce tu PIN" oninput="validarPin(this.value)">
            <button id="btn-login" class="hidden" onclick="irABienvenida()">Ingresar al Sistema</button>
        </div>
    </div>

    <div id="bienvenida-ia" class="container hidden">
        <h2 id="ia-title">Asistente Virtual</h2>
        <p id="msg-bienvenida"></p>
        <div id="area-notificaciones"></div>
        <button onclick="verificarRutas()">Manos a la obra</button>
    </div>

    <div id="menu-pestañas" class="hidden">
        <h3 style="color: var(--futuristic); text-align:center; margin-top:40px;">Panel de Trabajo</h3>
        <div id="lista-botones" class="grid-container"></div>
        <div style="text-align:center;">
            <button style="background:#30363d; width:200px; margin-top:20px;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </div>

    <div id="entorno-trabajo" class="container hidden">
        <h3 id="workspace-name" style="color: var(--futuristic)">Herramienta</h3>
        <div id="contenido-herramienta"></div>
        <button style="background:#30363d; margin-top:20px;" onclick="volverAlMenu()">Volver al Menú Principal</button>
    </div>

    <script>
        const db = {
            "JBaltodano_Admin": { 
                pin: "404471", cargo: "Admin",
                permisos: ["Extractor de Codigo de Caja para Kohl's", "QA Reports for Weekly Issues", "Cumpleañeros", "Usuarios", "Configuraciones"],
                iconos: ["fa-code", "fa-file-medical", "fa-cake-candles", "fa-user-gear", "fa-gears"],
                cumpleHoy: true 
            },
            "QA_Auditor": { 
                pin: "5678", cargo: "Auditor",
                permisos: ["QA Reports for Weekly Issues"],
                iconos: ["fa-clipboard-check"],
                cumpleHoy: false 
            }
        };

        let userActivo = "";
        const asis = document.getElementById('asistente-ia');

        function validarUser(val) {
            if(db[val]) {
                userActivo = val;
                asis.innerText = `IA: Usuario reconocido. Hola ${val.split('_')[0]}.`;
                document.getElementById('btn-next-user').classList.remove('hidden');
            }
        }

        function irAlPin() {
            document.getElementById('step-user').classList.add('hidden');
            document.getElementById('step-pin').classList.remove('hidden');
            asis.innerText = "IA: Ahora ingresa tu PIN de acceso.";
        }

        function validarPin(pin) {
            if(db[userActivo].pin === pin) {
                document.getElementById('btn-login').classList.remove('hidden');
            }
        }

        function irABienvenida() {
            document.getElementById('login-flow').classList.add('hidden');
            document.getElementById('bienvenida-ia').classList.remove('hidden');
            const u = db[userActivo];
            document.getElementById('msg-bienvenida').innerText = `Soy tu asistente IA. Estoy aquí para ayudarte en tu cargo como ${u.cargo}.`;
            if(u.cargo === "Admin" && u.cumpleHoy) {
                document.getElementById('area-notificaciones').innerHTML = `<div class="badge-cumple">🎂 ¡Atención Admin! Hay un cumpleañero hoy.</div>`;
            }
        }

        function verificarRutas() {
            const u = db[userActivo];
            document.getElementById('bienvenida-ia').classList.add('hidden');
            if (u.permisos.length > 1) {
                document.getElementById('menu-pestañas').classList.remove('hidden');
                const lista = document.getElementById('lista-botones');
                lista.innerHTML = "";
                u.permisos.forEach((p, i) => {
                    lista.innerHTML += `
                        <div class="tile" onclick="abrirHerramienta('${p}')">
                            <i class="fa-solid ${u.iconos[i]}"></i>
                            <span>${p}</span>
                        </div>`;
                });
            } else {
                abrirHerramienta(u.permisos[0]);
            }
        }

        function abrirHerramienta(nombre) {
            document.getElementById('menu-pestañas').classList.add('hidden');
            document.getElementById('entorno-trabajo').classList.remove('hidden');
            document.getElementById('workspace-name').innerText = nombre;
            const panel = document.getElementById('contenido-herramienta');
            
            if (nombre.includes("Extractor")) {
                panel.innerHTML = `
                    <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; text-align: left;">
                        <div style="flex: 1; min-width: 220px; border-right: 1px solid #333; padding-right: 15px;">
                            <div style="position: relative; width: 120px; height: 120px; margin: auto;">
                                <canvas id="canvasReloj" width="120" height="120"></canvas>
                                <div id="hora-digital" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; color: var(--futuristic);"></div>
                            </div>
                            <div id="calendario-mini" style="margin-top: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                                <div style="color: var(--futuristic); font-size: 0.8rem; margin-bottom: 5px; text-align:center;">Abril 2026</div>
                                <div style="display: grid; grid-template-columns: repeat(7, 1fr); font-size: 0.6rem; text-align: center; gap: 3px;">
                                    <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
                                    ${generarDiasCalendario(13)}
                                </div>
                            </div>
                        </div>
                        <div style="flex: 2; min-width: 280px;">
                            <textarea id="inputCodigo" placeholder="Pega Código Aquí" oninput="verificarContenido()" style="height: 120px;"></textarea>
                            <button id="btn-extraer" class="hidden" onclick="procesarCodigo()">Extraer Código</button>
                            <div id="seccion-resultados" class="hidden">
                                <p style="font-size: 0.8rem; color: var(--futuristic); margin: 15px 0 5px;">Resultados:</p>
                                <textarea id="outputResultados" readonly style="height: 100px; background: #161b22; color: #aff5b4; border-color: #238636;"></textarea>
                                <button onclick="copiarYLimpiar()" style="background: #238636;"><i class="fa-brands fa-whatsapp"></i> Copiar para WhatsApp</button>
                            </div>
                        </div>
                    </div>
                `;
                setTimeout(iniciarRelojProgresivo, 100);
            } else if (nombre === "Usuarios") {
                panel.innerHTML = `<div style="text-align:left;">👤 Jose Alfredo Baltodano (Admin)<br>👤 QA_Auditor (Auditor)</div>`;
            } else {
                panel.innerHTML = `<p>Módulo de ${nombre} en desarrollo...</p>`;
            }
        }

        function verificarContenido() {
            const input = document.getElementById('inputCodigo');
            const btn = document.getElementById('btn-extraer');
            btn.classList.toggle('hidden', input.value.trim().length === 0);
        }

        function procesarCodigo() {
            const input = document.getElementById('inputCodigo').value;
            // Aquí puedes poner tu lógica real de extracción
            document.getElementById('outputResultados').value = "EXTRACCIÓN EXITOSA:\n" + input;
            document.getElementById('seccion-resultados').classList.remove('hidden');
        }

        function copiarYLimpiar() {
            const out = document.getElementById('outputResultados');
            navigator.clipboard.writeText(out.value).then(() => {
                alert("Copiado al portapapeles con éxito");
                document.getElementById('inputCodigo').value = "";
                document.getElementById('seccion-resultados').classList.add('hidden');
                document.getElementById('btn-extraer').classList.add('hidden');
            });
        }

        function volverAlMenu() {
            document.getElementById('entorno-trabajo').classList.add('hidden');
            document.getElementById('menu-pestañas').classList.remove('hidden');
        }

        function generarDiasCalendario(diaActual) {
            let html = "";
            for(let i=1; i<=30; i++) {
                let style = i === diaActual ? "background: var(--futuristic); color: black; border-radius: 50%; font-weight: bold;" : "";
                html += `<span style="${style}">${i}</span>`;
            }
            return html;
        }

        function iniciarRelojProgresivo() {
            const canvasR = document.getElementById('canvasReloj');
            if (!canvasR) return;
            const ctxR = canvasR.getContext('2d');
            
            setInterval(() => {
                const ahora = new Date();
                ctxR.clearRect(0, 0, 120, 120);
                // Círculo base
                ctxR.beginPath(); ctxR.arc(60, 60, 50, 0, 2 * Math.PI);
                ctxR.strokeStyle = "#161b22"; ctxR.lineWidth = 8; ctxR.stroke();
                // Progreso Jornada (8am - 5pm)
                let pct = (ahora.getHours() - 8) / 9; 
                pct = Math.min(Math.max(pct, 0), 1);
                ctxR.beginPath(); ctxR.arc(60, 60, 50, -Math.PI/2, (-Math.PI/2) + (2 * Math.PI * pct));
                ctxR.strokeStyle = "#00f2ff"; ctxR.stroke();
                document.getElementById('hora-digital').innerText = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                // Alarma Voz (15 min antes de salir)
                if(ahora.getHours() === 16 && ahora.getMinutes() === 45) {
                    hablar("Atención Jose, faltan quince minutos para finalizar la jornada. Ve guardando tu progreso.");
                }
            }, 1000);
        }

        function hablar(mensaje) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(mensaje);
            utterance.lang = 'es-MX';
            synth.speak(utterance);
        }

        // --- FONDO ANIMADO ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let particles = [];
        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2; this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) this.init();
            }
            draw() {
                ctx.fillStyle = "rgba(0, 242, 255, 0.4)";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 60; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
    </script>
</body>
</html>

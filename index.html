<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor Profesional de Código</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #007bff;
            --error-color: #ffca28;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .login-container, .app-container {
            background: #161b22;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { opacity: 0.8; }

        #asistente-texto {
            color: var(--error-color);
            font-size: 0.9em;
            min-height: 40px;
            margin: 10px 0;
        }

        .btn-recuperar {
            background-color: transparent;
            color: var(--error-color);
            border: 1px solid var(--error-color);
            font-size: 0.8em;
            display: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-section" class="login-container">
        <h2>Acceso al Sistema</h2>
        <div id="asistente-texto">IA: Por favor, ingresa tu usuario.</div>
        
        <input type="text" id="user-input" placeholder="Nombre de Usuario" oninput="validarUsuarioRealTime(this.value)">
        <button id="btn-recuperar-user" class="btn-recuperar" onclick="soporteWA('usuario')">Recuperar Usuario vía WhatsApp</button>
        
        <input type="password" id="pin-input" class="hidden" placeholder="Introduce tu PIN" oninput="validarPinRealTime(this.value)">
        <button id="btn-recuperar-pin" class="btn-recuperar" onclick="soporteWA('PIN')">Recuperar PIN vía WhatsApp</button>
        
        <button id="btn-entrar" class="hidden" onclick="entrarAlPrograma()">Ingresar al Entorno</button>
    </div>

    <div id="app-section" class="app-container hidden">
        <h2 id="welcome-msg">Bienvenido</h2>
        <textarea id="inputCodigo" placeholder="Pega el código aquí..." style="width:100%; height:100px; background:#0d1117; color:white; border-radius:6px;"></textarea>
        <div id="resultado" style="margin:10px; padding:10px; border:1px dashed #30363d;"></div>
        
        <button onclick="copiarParaWhatsApp()">Copiar para WhatsApp</button>
        <button style="background:#30363d;" onclick="location.reload()">Salir</button>
    </div>

    <script>
        // --- BASE DE DATOS Y ESTADOS ---
        const usuariosDB = {
            "Jose Alfredo Baltodano Mora": { pin: "1234", cargo: "Admin", genero: "masculino" },
            "QA_Auditor": { pin: "5678", cargo: "QA", genero: "femenino" }
        };

        let usuarioIdentificado = null;
        let timerEscritura;
        const asistente = document.getElementById('asistente-texto');

        // --- LÓGICA DE VALIDACIÓN INTELIGENTE (TEXTO) ---
        function validarUsuarioRealTime(valor) {
            clearTimeout(timerEscritura);
            asistente.innerText = "IA: Escribiendo...";
            
            timerEscritura = setTimeout(() => {
                if (valor.length > 5) {
                    if (usuariosDB[valor]) {
                        usuarioIdentificado = valor;
                        asistente.innerText = "IA: Usuario reconocido. Ahora ingresa tu PIN.";
                        document.getElementById('pin-input').classList.remove('hidden');
                        document.getElementById('btn-recuperar-user').style.display = "none";
                    } else {
                        asistente.innerText = "IA: Ese usuario no es correcto, revisa si hay algún error.";
                        document.getElementById('btn-recuperar-user').style.display = "block";
                    }
                }
            }, 1000);
        }

        function validarPinRealTime(pin) {
            clearTimeout(timerEscritura);
            timerEscritura = setTimeout(() => {
                if (pin.length >= 4) {
                    if (usuariosDB[usuarioIdentificado].pin === pin) {
                        asistente.innerText = "IA: PIN correcto. Ya puedes ingresar.";
                        document.getElementById('btn-entrar').classList.remove('hidden');
                        document.getElementById('btn-recuperar-pin').style.display = "none";
                    } else {
                        asistente.innerText = "IA: El PIN es incorrecto. Inténtalo de nuevo.";
                        document.getElementById('btn-recuperar-pin').style.display = "block";
                    }
                }
            }, 1000);
        }

        // --- FUNCIONES DE ACCIÓN ---
        function entrarAlPrograma() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Panel ${usuariosDB[usuarioIdentificado].cargo}: ${usuarioIdentificado}`;
        }

        function soporteWA(tipo) {
            const msj = `Hola Jose, se me olvidó mi ${tipo} del Extractor. ¿Me ayudas?`;
            window.open(`https://wa.me/50588888888?text=${encodeURIComponent(msj)}`, '_blank'); // Cambia el número por el tuyo
        }

        function copiarParaWhatsApp() {
            const input = document.getElementById('inputCodigo');
            const res = document.getElementById('resultado');
            res.innerText = "PROCESADO: " + input.value; // Aquí va tu lógica de extracción

            navigator.clipboard.writeText(res.innerText).then(() => {
                alert("Copiado con éxito");
                // REGLA: Limpiar tras copiar
                input.value = "";
                res.innerText = "";
            });
        }

        // --- REGISTRO PWA PARA INSTALACIÓN ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>

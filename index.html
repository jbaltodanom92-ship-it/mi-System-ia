<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema IA - Jose Alfredo B.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #03080f; --card: rgba(13, 17, 23, 0.98); --accent: #00f2ff; --text: #c9d1d9; --panel: #161b22; --error: #ff4b4b; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #matrix-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.15; }

        .app-container {
            width: 95%; max-width: 1250px; height: 90vh;
            background: var(--card); border: 1px solid #30363d; border-radius: 15px;
            position: relative; z-index: 10; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        /* LOGIN EVOLUTIVO */
        #sec-login { display: flex; align-items: center; justify-content: center; height: 100%; gap: 40px; padding: 40px; }
        .avatar-container { width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; background: rgba(0, 242, 255, 0.05); border-radius: 15px; border: 1px solid #30363d; overflow: hidden; }
        .avatar-container i { font-size: 6rem; color: var(--accent); }
        .user-photo { width: 100%; height: 100%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: bold; }
        
        .login-form { display: flex; flex-direction: column; gap: 10px; width: 400px; }
        .asis-box { font-style: italic; color: var(--accent); margin-bottom: 5px; min-height: 1.5em; text-align: center; }
        .asis-box.err { color: var(--error); text-shadow: 0 0 8px var(--error); }
        .login-input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; border-radius: 8px; font-size: 1.1rem; outline: none; transition: 0.3s; }
        .login-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        /* PANEL CON SCROLL */
        #sec-panel { display: flex; flex-direction: column; height: 100%; }
        .scroll-v { flex-grow: 1; overflow-y: auto; padding: 20px 50px; }
        .scroll-v::-webkit-scrollbar { width: 8px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        .grid-mosaic { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .tile { background: var(--panel); border-left: 5px solid var(--accent); padding: 30px; cursor: pointer; display: flex; align-items: center; gap: 25px; transition: 0.2s; border-radius: 4px; }
        .tile:hover { transform: scale(1.02); background: #1c2128; box-shadow: 0 0 20px var(--accent); }

        /* EXTRACTOR HORIZONTAL BLINDADO */
        .extractor-layout { display: flex; flex-direction: row; gap: 25px; padding: 25px; height: 100%; box-sizing: border-box; }
        .side-info { width: 250px; display: flex; flex-direction: column; gap: 20px; align-items: center; flex-shrink: 0; }
        .main-editor { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .row-horizontal { display: flex; flex-direction: row; gap: 15px; flex-grow: 1; height: 50%; }
        
        textarea, #outputRes { flex: 1; background: #0d1117; border: 1px solid #30363d; color: var(--accent); padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.95rem; overflow-y: auto; box-sizing: border-box; }
        #outputRes { border-color: #238636; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
        .tag-cod { background: rgba(35, 134, 54, 0.2); border: 1px solid #238636; padding: 5px 10px; border-radius: 5px; color: #aff5b4; }

        button { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; width: 100%; }
        .btn-success { background: #238636; color: white; width: 100%; }
        .btn-nav { background: #30363d; color: white; width: 100%; }
        .hidden { display: none !important; }

        /* RELOJ Y CALENDARIO */
        .reloj-wrap { position: relative; width: 160px; height: 160px; }
        #digital-time { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        #cal-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; width: 100%; font-size: 0.8rem; border: 1px solid #333; }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="app-container">
        <div id="sec-login">
            <div id="avatar-box" class="avatar-container">
                <i class="fa-solid fa-robot" id="robot-icon"></i>
                <div id="user-photo" class="user-photo hidden">JA</div>
            </div>
            <div class="login-form">
                <h2 style="color: var(--accent); margin: 0; text-align:center;">SISTEMA DE SEGURIDAD</h2>
                <div id="ia-status" class="asis-box">IA: Ingrese su identificación.</div>
                <input type="text" id="user-in" class="login-input" placeholder="Usuario" onkeypress="handleLogin(event, 'user')">
                <input type="password" id="pin-in" class="login-input hidden" placeholder="PIN de Seguridad" oninput="handlePin(this.value)">
                <div style="font-size: 0.75rem; color: #8b949e; text-align: center; cursor: pointer; text-decoration: underline;" onclick="help()">¿Olvidó sus datos? Contactar a Informática</div>
            </div>
        </div>

        <div id="sec-panel" class="hidden">
            <div style="padding: 30px 50px 10px;"><h3>PANEL DE CONTROL</h3></div>
            <div class="scroll-v">
                <div class="grid-mosaic">
                    <div class="tile" onclick="openExtractor()"><i class="fa-solid fa-code" style="font-size: 2rem; color: var(--accent);"></i><span>Extractor Kohl's</span></div>
                    <div class="tile"><i class="fa-solid fa-file-medical" style="font-size: 2rem; color: var(--accent);"></i><span>QA Reports</span></div>
                    <div class="tile"><i class="fa-solid fa-cake-candles" style="font-size: 2rem; color: var(--accent);"></i><span>Cumpleañeros</span></div>
                    <div class="tile"><i class="fa-solid fa-user-shield" style="font-size: 2rem; color: var(--accent);"></i><span>Usuarios</span></div>
                    <div class="tile"><i class="fa-solid fa-gears" style="font-size: 2rem; color: var(--accent);"></i><span>Configuraciones</span></div>
                </div>
            </div>
            <div style="padding: 20px 50px;"><button class="btn-nav" style="width: 200px;" onclick="location.reload()">Cerrar Sesión</button></div>
        </div>

        <div id="sec-extractor" class="hidden">
            <div class="extractor-layout">
                <div class="side-info">
                    <div class="reloj-wrap">
                        <canvas id="clockCanvas" width="160" height="160"></canvas>
                        <div id="digital-time">00:00:00</div>
                    </div>
                    <div id="cal-box"></div>
                    <button class="btn-nav" onclick="backToMenu()">Volver al Menú</button>
                </div>
                <div class="main-editor">
                    <h3 style="color: var(--accent); margin: 0;">Extractor de Código Kohl's</h3>
                    <div class="row-horizontal">
                        <textarea id="inputRaw" placeholder="Pega los códigos aquí..." oninput="autoCheck()"></textarea>
                        <div id="outputRes"></div>
                    </div>
                    <button id="btn-process" class="btn-primary hidden" onclick="runExtractor()">Extraer Código</button>
                    <div id="res-actions" class="hidden">
                        <button class="btn-success" onclick="copyClear()"><i class="fa-brands fa-whatsapp"></i> Copiar y Limpiar Todo</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_USER = "JBaltodano_Admin";
        const ADMIN_PIN = "404471";

        // LÓGICA DE LOGIN
        function handleLogin(e, type) {
            if(e.key === 'Enter') {
                const val = document.getElementById('user-in').value;
                const status = document.getElementById('ia-status');
                if(val === ADMIN_USER) {
                    status.innerText = "IA: Usuario reconocido. Ingrese su PIN.";
                    status.classList.remove('err');
                    document.getElementById('robot-icon').classList.add('hidden');
                    document.getElementById('user-photo').classList.remove('hidden');
                    document.getElementById('user-in').classList.add('hidden');
                    document.getElementById('pin-in').classList.remove('hidden').focus();
                } else {
                    status.innerText = "IA Error: Identificación no válida.";
                    status.classList.add('err');
                }
            }
        }

        function handlePin(v) {
            if(v.length === 6) {
                if(v === ADMIN_PIN) {
                    document.getElementById('sec-login').classList.add('hidden');
                    document.getElementById('sec-panel').classList.remove('hidden');
                } else {
                    const status = document.getElementById('ia-status');
                    status.innerText = "IA Error: PIN incorrecto.";
                    status.classList.add('err');
                    document.getElementById('pin-in').value = "";
                }
            }
        }

        function help() { window.open("https://wa.me/50584386180"); } // Número corregido

        // EXTRACTOR HORIZONTAL
        function openExtractor() {
            document.getElementById('sec-panel').classList.add('hidden');
            document.getElementById('sec-extractor').classList.remove('hidden');
            startClock(); renderCal();
        }
        function backToMenu() { document.getElementById('sec-extractor').classList.add('hidden'); document.getElementById('sec-panel').classList.remove('hidden'); }

        function autoCheck() {
            const hasVal = document.getElementById('inputRaw').value.trim() !== "";
            document.getElementById('btn-process').classList.toggle('hidden', !hasVal);
        }

        function runExtractor() {
            const out = document.getElementById('outputRes');
            out.innerHTML = "";
            const lines = document.getElementById('inputRaw').value.split('\n');
            lines.forEach(line => {
                if(line.trim().length >= 8) {
                    out.innerHTML += `<span class="tag-cod">${line.trim().slice(-8)}</span>`;
                }
            });
            document.getElementById('res-actions').classList.remove('hidden');
        }

        function copyClear() {
            const text = Array.from(document.querySelectorAll('.tag-cod')).map(t => t.innerText).join(' ');
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('inputRaw').value = "";
                document.getElementById('outputRes').innerHTML = "";
                document.getElementById('res-actions').classList.add('hidden');
                autoCheck();
            });
        }

        // HERRAMIENTAS VISUALES
        function renderCal() {
            let h = `<div style="text-align:center; color:var(--accent); font-weight:bold; margin-bottom:5px;">Abril 2026</div><div style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center;"><span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>`;
            for(let i=1; i<=30; i++) h += `<span style="${i===13?'background:var(--accent); color:#000; border-radius:50%; font-weight:bold;':''}">${i}</span>`;
            document.getElementById('cal-box').innerHTML = h + "</div>";
        }

        function startClock() {
            const ctx = document.getElementById('clockCanvas').getContext('2d');
            setInterval(() => {
                const d = new Date();
                ctx.clearRect(0,0,160,160);
                ctx.beginPath(); ctx.arc(80,80,75,0,2*Math.PI); ctx.strokeStyle="#161b22"; ctx.lineWidth=8; ctx.stroke();
                let pct = (d.getHours() - 8 + d.getMinutes()/60) / 9;
                ctx.beginPath(); ctx.arc(80,80,75,-Math.PI/2, -Math.PI/2 + 2*Math.PI*Math.min(Math.max(pct,0),1));
                ctx.strokeStyle="#00f2ff"; ctx.lineWidth=8; ctx.lineCap="round"; ctx.stroke();
                document.getElementById('digital-time').innerText = d.toLocaleTimeString();
            }, 1000);
        }

        // MATRIX BACKGROUND
        const c = document.getElementById("matrix-bg"); const mctx = c.getContext("2d");
        function rz() { c.width = window.innerWidth; c.height = window.innerHeight; }
        window.onresize = rz; rz();
        const cols = Array(Math.floor(c.width/20)).fill(1);
        function drawM() {
            mctx.fillStyle = "rgba(3, 8, 15, 0.1)"; mctx.fillRect(0,0,c.width,c.height);
            mctx.fillStyle = "#00f2ff33"; mctx.font = "15px monospace";
            cols.forEach((y, i) => {
                mctx.fillText("01"[Math.floor(Math.random()*2)], i*20, y*20);
                if(y*20 > c.height && Math.random() > 0.98) cols[i] = 0;
                cols[i]++;
            });
        }
        setInterval(drawM, 60);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema JB - IA Evolutiva Full</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #02060a; --accent: #00f2ff; --win-blue: #0078d7; --card: #0d1117; --error: #ffeb3b; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        .view { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: absolute; transition: 0.5s Ease; }
        .hidden { opacity: 0 !important; pointer-events: none !important; transform: scale(0.95) !important; }
        .display-none { display: none !important; }

        /* LOGIN EVOLUTIVO DINÁMICO */
        .login-card { width: 600px; display: flex; align-items: center; gap: 30px; background: rgba(255,255,255,0.02); padding: 40px; border: 1px solid #1a2026; border-radius: 12px; }
        .avatar-frame { width: 150px; height: 150px; border: 1px solid #30363d; display: flex; align-items: center; justify-content: center; background: #010409; overflow: hidden; border-radius: 4px; }
        .avatar-frame i { font-size: 5rem; color: #1f4b5e; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        input { width:100%; padding:12px; background:#0d1117; color:white; border:1px solid #30363d; border-radius: 4px; font-size: 1rem; }

        /* PANEL METRO */
        .metro-grid { display: grid; grid-template-columns: repeat(4, 160px); grid-template-rows: repeat(2, 160px); gap: 12px; }
        .tile { position: relative; width: 160px; height: 160px; background: var(--win-blue); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .tile:hover { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 0 25px var(--accent); z-index: 10; }
        .tile.wide { width: 332px; grid-column: span 2; }
        .tile span { position: absolute; bottom: 10px; left: 10px; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }

        /* EXTRACTOR */
        .ext-container { width: 1100px; display: flex; gap: 30px; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #1a2026; }
        .side-tools { width: 300px; display: flex; flex-direction: column; align-items: center; gap: 20px; border-right: 1px solid #30363d; padding-right: 20px; }
        .progress-box { position: relative; width: 190px; height: 190px; display: flex; align-items: center; justify-content: center; }
        .prog-canvas { position: absolute; transform: rotate(-90deg); }
        .clock-num { font-size: 1.8rem; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        textarea { width: 100%; height: 140px; background: white; color: black; border: none; padding: 15px; font-family: 'Consolas', monospace; border-radius: 4px; resize: none; }
        #txt-out { height: 60px; color: var(--accent); background: #010409; }
        .btn-win { width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-blue { background: #0078d7; color: white; }
        .btn-green { background: #238636; color: white; }
    </style>
</head>
<body>

    <div id="v-login" class="view">
        <div class="login-card">
            <div class="avatar-frame">
                <i class="fa-solid fa-robot" id="bot-icon"></i>
                <img id="user-photo" src="https://i.imgur.com/8Km9tLL.png" class="hidden">
            </div>
            <div style="flex-grow: 1;">
                <h2 style="color: var(--accent); margin-bottom: 10px;">SEGURIDAD IA</h2>
                <div id="asis-msg" style="color:var(--accent); font-style:italic; margin-bottom: 15px; font-size: 0.9rem;">IA: Escriba su usuario...</div>
                <input type="text" id="u-in" placeholder="Usuario" oninput="iaCheckUser(this.value)">
                <input type="password" id="p-in" class="hidden" placeholder="Ingrese PIN" oninput="iaCheckPin(this.value)">
            </div>
        </div>
    </div>

    <div id="v-welcome" class="view hidden">
        <div style="width: 85%;">
            <h1 style="font-size: 4rem; font-weight: 100; margin: 0;">Hola, <span id="user-display"></span></h1>
            <div id="ia-family-report" style="margin-top: 25px; padding: 25px; border-left: 4px solid var(--accent); background: rgba(0,242,255,0.05);">
                </div>
            <div id="lunch-module" class="hidden" style="margin-top:20px; padding: 15px; border: 1px dashed var(--error); background: rgba(255,235,59,0.05);">
                IA: ¿A qué hora almorzarás hoy? <input type="time" id="lunch-time-input" style="width: auto;">
                <button onclick="saveLunchIA()" style="padding: 5px 15px; background: var(--accent); border:none; cursor:pointer;">Guardar</button>
            </div>
            <button class="btn-win btn-blue" style="width: 250px; margin-top: 40px;" onclick="showView('v-panel')">CONTINUAR</button>
        </div>
    </div>

    <div id="v-panel" class="view hidden" style="flex-direction: column; align-items: flex-start; padding-left: 100px;">
        <h2 style="font-weight: 100; font-size: 3.5rem; margin-bottom: 30px;">Inicio</h2>
        <div class="metro-grid">
            <div class="tile wide" style="background:#00a4ef" onclick="showView('v-ext'); initEngine();">
                <i class="fa-solid fa-bolt"></i><span>Extractor Master</span>
            </div>
            <div class="tile" style="background:#7fba00"><i class="fa-solid fa-file-export"></i><span>Reportes</span></div>
            <div id="bday-tile" class="tile" style="background:#744da9"><i class="fa-solid fa-cake-candles"></i><span>Familia</span></div>
            <div class="tile" style="background:#f25022" onclick="location.reload()"><i class="fa-solid fa-power-off"></i><span>Salir</span></div>
        </div>
    </div>

    <div id="v-ext" class="view hidden">
        <div class="ext-container">
            <div class="side-tools">
                <div class="progress-box">
                    <canvas id="progCanvas" width="190" height="190" class="prog-canvas"></canvas>
                    <div class="time-display" style="text-align: center; z-index: 10;">
                        <div id="d-time" class="clock-num">00:00:00</div>
                        <div id="alarm-txt" style="color: var(--error); font-weight: bold; font-size: 0.8rem;"></div>
                    </div>
                </div>
                <div id="cal-box" style="background:rgba(0,0,0,0.3); padding:15px; border-radius:8px; width:100%;"></div>
                <button class="btn-win" style="background:#3c4043; color:white;" onclick="showView('v-panel')">VOLVER</button>
            </div>
            <div style="flex-grow:1; display:flex; flex-direction:column; gap:12px;">
                <h3 style="color:var(--accent); margin:0;">Extractor Kohl's (8 Dígitos)</h3>
                <textarea id="txt-in" placeholder="Pega los códigos aquí..." oninput="showBtn()"></textarea>
                <button id="btn-run" class="btn-win btn-blue hidden display-none" onclick="doExtract()">EXTRAER AHORA</button>
                <div id="res-group" class="hidden display-none">
                    <textarea id="txt-out" readonly></textarea>
                    <button class="btn-win btn-green" style="margin-top:10px;" onclick="copyAndClear()"><i class="fa-brands fa-whatsapp"></i> COPIAR HORIZONTAL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "";
        const BD_USUARIOS = { "JBaltodano_Admin": "404471" };
        const BD_FAMILIA = [
            { nombre: "Hilda (Mamá)", mes: 1, dia: 27 },
            { nombre: "Hija", mes: 0, dia: 15 } // Enero es 0
        ];

        // LOGIN IA: RECONOCIMIENTO AUTOMÁTICO
        function iaCheckUser(val) {
            if(BD_USUARIOS[val]) {
                currentUser = val;
                document.getElementById('asis-msg').innerText = "IA: Usuario reconocido. Ingrese PIN de seguridad.";
                document.getElementById('bot-icon').classList.add('hidden');
                document.getElementById('user-photo').classList.remove('hidden');
                document.getElementById('u-in').classList.add('hidden');
                document.getElementById('p-in').classList.remove('hidden').focus();
            }
        }

        function iaCheckPin(val) {
            if(val === BD_USUARIOS[currentUser]) {
                document.getElementById('user-display').innerText = "Jose Alfredo";
                showView('v-welcome');
                iaFamilyLogic();
            }
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // IA DE BIENVENIDA: CUMPLEAÑOS Y EVENTOS
        function iaFamilyLogic() {
            const now = new Date();
            const report = document.getElementById('ia-family-report');
            let html = `<p><i class="fa-solid fa-robot"></i> <strong>IA:</strong> Análisis de sistema completo.</p>`;
            
            // Buscar cumpleaños hoy o pronto
            let hayEventos = false;
            BD_FAMILIA.forEach(f => {
                const bday = new Date(now.getFullYear(), f.mes, f.dia);
                const diff = (bday - now) / (1000 * 60 * 60 * 24);

                if(now.getMonth() === f.mes && now.getDate() === f.dia) {
                    html += `<p style="color:var(--accent); font-weight:bold;"><i class="fa-solid fa-cake-candles"></i> ¡ATENCIÓN! Hoy es el cumpleaños de ${f.nombre}.</p>`;
                    hayEventos = true;
                } else if (diff > 0 && diff <= 7) {
                    html += `<p style="color:var(--error);"><i class="fa-solid fa-calendar-day"></i> RECORDATORIO: El cumpleaños de ${f.nombre} es en ${Math.ceil(diff)} días.</p>`;
                    hayEventos = true;
                }
            });

            if(!hayEventos) html += `<p>No hay cumpleaños familiares hoy ni en la próxima semana. Jornada tranquila.</p>`;
            
            report.innerHTML = html;
            
            // Lógica de Almuerzo IA
            const weekKey = `lunch_${currentUser}_W${Math.ceil(now.getDate()/7)}`;
            if(!localStorage.getItem(weekKey) && now.getDay() !== 0) {
                document.getElementById('lunch-module').classList.remove('hidden');
            }
        }

        function saveLunchIA() {
            const t = document.getElementById('lunch-time-input').value;
            localStorage.setItem(`lunch_${currentUser}_W${Math.ceil(new Date().getDate()/7)}`, t);
            document.getElementById('lunch-module').classList.add('hidden');
        }

        // MOTOR DEL EXTRACTOR BLINDADO
        function initEngine() {
            const ctx = document.getElementById('progCanvas').getContext('2d');
            setInterval(() => {
                const now = new Date();
                const h = now.getHours(), m = now.getMinutes(), day = now.getDay();
                document.getElementById('d-time').innerText = now.toLocaleTimeString();

                let start = 7, end = (day >= 2 && day <= 4) ? 18 : 17;
                
                ctx.clearRect(0,0,190,190);
                ctx.beginPath(); ctx.arc(95,95,90,0,2*Math.PI); ctx.strokeStyle="#1a2026"; ctx.lineWidth=10; ctx.stroke();
                
                let progress = 0;
                if(h >= start && h < end) progress = ((h-start)*3600 + m*60) / ((end-start)*3600);
                else if(h >= end) progress = 1;

                ctx.beginPath(); ctx.arc(95,95,90,0,progress*2*Math.PI); ctx.strokeStyle="#00f2ff"; ctx.lineWidth=10; ctx.stroke();
                
                // Alarma de Salida
                if(h === end && m === 0) document.getElementById('alarm-txt').innerText = "FIN DE JORNADA";
            }, 1000);
            initCal();
        }

        function showBtn() {
            const val = document.getElementById('txt-in').value.trim();
            document.getElementById('btn-run').className = val ? "btn-win btn-blue" : "display-none";
        }

        function doExtract() {
            const lines = document.getElementById('txt-in').value.split('\n');
            const res = lines.map(l => l.trim()).filter(l => l.length >= 8).map(l => l.slice(-8));
            document.getElementById('txt-out').value = res.join(' '); // HORIZONTAL
            document.getElementById('res-group').classList.remove('hidden', 'display-none');
        }

        function copyAndClear() {
            navigator.clipboard.writeText(document.getElementById('txt-out').value);
            document.getElementById('txt-in').value = "";
            document.getElementById('res-group').classList.add('hidden', 'display-none');
            showBtn();
        }

        function initCal() {
            const d = new Date();
            document.getElementById('cal-box').innerHTML = `<div style="text-align:center; color:var(--accent); font-weight:bold; margin-bottom:10px;">ABRIL 2026</div><div style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:0.75rem;">` + 
            "DLMMJVS".split('').map(l => `<span>${l}</span>`).join('') + 
            Array.from({length:30}, (_,i) => `<span style="${i+1===d.getDate()?'color:var(--accent);border:1px solid var(--accent);border-radius:50%':''}">${i+1}</span>`).join('') + "</div>";
        }
    </script>
</body>
</html>

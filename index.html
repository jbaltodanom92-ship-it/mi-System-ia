<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema IA - Jose Alfredo B.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #03080f; --card: rgba(13, 17, 23, 0.95); --accent: #00f2ff; --text: #c9d1d9; --panel: #161b22; --error: #ff4d4d; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #bg-static { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a192f 0%, #03080f 100%); opacity: 0.5; }

        .app-container {
            width: 95%; max-width: 1250px; height: 85vh;
            background: var(--card); border: 1px solid #30363d; border-radius: 12px;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        /* LOGIN CON FEEDBACK DE ERROR */
        .sec-full { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        .login-box { display: flex; flex-direction: column; gap: 12px; width: 350px; }
        .asis-box { font-size: 0.9rem; margin-bottom: 10px; min-height: 1.2em; transition: 0.2s; color: var(--accent); }
        .asis-error { color: var(--error) !important; font-weight: bold; }
        .login-input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; font-size: 1rem; outline: none; }
        .login-input.input-error { border-color: var(--error); box-shadow: 0 0 5px var(--error); }

        /* PANEL CON SCROLL VERTICAL */
        #sec-panel { display: flex; flex-direction: column; height: 100%; }
        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 20px 40px; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        .grid-mosaic { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .tile { background: var(--panel); border-left: 4px solid var(--accent); padding: 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .tile:hover { background: #1c2128; transform: translateY(-2px); }

        /* EXTRACTOR HORIZONTAL */
        .layout-h { display: flex; flex-direction: row; gap: 20px; padding: 20px; height: 100%; box-sizing: border-box; }
        .side-bar { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #30363d; padding-right: 20px; }
        .work-zone { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        
        /* CAJAS HORIZONTALES */
        .editor-row { display: flex; flex-direction: row; gap: 15px; flex-grow: 1; height: 60%; }
        textarea, #outputRes { flex: 1; background: #0d1117; border: 1px solid #30363d; color: var(--accent); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; overflow-y: auto; }
        #outputRes { border-color: #238636; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
        
        .codigo-tag { background: rgba(35, 134, 54, 0.2); border: 1px solid #238636; padding: 4px 8px; border-radius: 4px; color: #aff5b4; }

        button { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-sec { background: #30363d; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="bg-static"></div>

    <div class="app-container">
        <div id="sec-login" class="sec-full">
            <h2 style="color: var(--accent);">SEGURIDAD DEL SISTEMA</h2>
            <div id="ia-msg" class="asis-box">IA: Identifíquese para continuar.</div>
            <div class="login-box">
                <input type="text" id="user-in" class="login-input" placeholder="Usuario" onkeypress="handleUserEnter(event)">
                <input type="password" id="pin-in" class="login-input hidden" placeholder="PIN de Seguridad" oninput="validatePin(this.value)">
                <span class="forgot-link" style="font-size: 0.7rem; cursor:pointer;" onclick="help()">Soporte Técnico</span>
            </div>
        </div>

        <div id="sec-welcome" class="sec-full hidden">
            <h1>Hola, Jose Alfredo</h1>
            <p id="bday-note" style="color: var(--accent);"></p>
            <button onclick="goPanel()" style="width: 200px;">Entrar al Panel</button>
        </div>

        <div id="sec-panel" class="hidden">
            <div style="padding: 20px 40px; border-bottom: 1px solid #30363d;"><h3>PANEL DE CONTROL</h3></div>
            <div class="scroll-area">
                <div class="grid-mosaic">
                    <div class="tile" onclick="goExtractor()"><i class="fa-solid fa-code"></i><span>Extractor de Caja</span></div>
                    <div class="tile"><i class="fa-solid fa-file-invoice"></i><span>Reportes QA</span></div>
                    <div class="tile"><i class="fa-solid fa-cake-candles"></i><span>Cumpleaños</span></div>
                    <div class="tile"><i class="fa-solid fa-users-gear"></i><span>Usuarios</span></div>
                    <div class="tile"><i class="fa-solid fa-gears"></i><span>Ajustes</span></div>
                    <div class="tile"><i class="fa-solid fa-database"></i><span>Base de Datos</span></div>
                </div>
            </div>
            <div style="padding: 15px 40px;"><button class="btn-sec" onclick="location.reload()">Cerrar Sesión</button></div>
        </div>

        <div id="sec-extractor" class="hidden">
            <div class="layout-h">
                <div class="side-bar">
                    <div id="reloj-mini" style="font-size: 1.5rem; font-weight: bold; color: var(--accent); text-align: center;">00:00:00</div>
                    <div id="cal-mini" style="font-size: 0.75rem; background: #000; padding: 10px; border-radius: 5px;"></div>
                    <button class="btn-sec" onclick="backToPanel()">Volver</button>
                </div>
                <div class="work-zone">
                    <div class="editor-row">
                        <textarea id="rawInput" placeholder="Pega los códigos aquí..." oninput="autoProcess()"></textarea>
                        <div id="outputRes"></div>
                    </div>
                    <button id="btn-copy" class="hidden" onclick="copyResult()" style="background: #238636; color: white;">Copiar 8 Dígitos y Limpiar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_USER = "JBaltodano_Admin";
        const ADMIN_PIN = "404471";

        // LÓGICA DE LOGIN CON ERROR
        function handleUserEnter(e) {
            if(e.key === 'Enter') {
                const val = document.getElementById('user-in').value;
                const msg = document.getElementById('ia-msg');
                if(val === ADMIN_USER) {
                    msg.innerText = "IA: Usuario correcto. Ingrese PIN.";
                    msg.classList.remove('asis-error');
                    document.getElementById('user-in').classList.add('hidden');
                    document.getElementById('pin-in').classList.remove('hidden').focus();
                } else {
                    msg.innerText = "IA: Error. El usuario no existe.";
                    msg.classList.add('asis-error');
                    document.getElementById('user-in').classList.add('input-error');
                }
            }
        }

        function validatePin(v) {
            if(v.length === 6) {
                const msg = document.getElementById('ia-msg');
                if(v === ADMIN_PIN) {
                    document.getElementById('sec-login').classList.add('hidden');
                    document.getElementById('sec-welcome').classList.remove('hidden');
                    checkBday();
                } else {
                    msg.innerText = "IA: PIN incorrecto. Intente de nuevo.";
                    msg.classList.add('asis-error');
                    document.getElementById('pin-in').classList.add('input-error');
                }
            }
        }

        function checkBday() {
            const hoy = new Date(); // Abril 13, 2026
            if(hoy.getMonth() === 3 && hoy.getDate() === 13) {
                document.getElementById('bday-note').innerText = "Hoy hay eventos especiales en el calendario.";
            }
        }

        function help() { window.open("https://wa.me/50584386180"); } // Número corregido
        function goPanel() { document.getElementById('sec-welcome').classList.add('hidden'); document.getElementById('sec-panel').classList.remove('hidden'); }
        function goExtractor() { document.getElementById('sec-panel').classList.add('hidden'); document.getElementById('sec-extractor').classList.remove('hidden'); startTools(); }
        function backToPanel() { document.getElementById('sec-extractor').classList.add('hidden'); document.getElementById('sec-panel').classList.remove('hidden'); }

        // EXTRACTOR AUTOMÁTICO
        function autoProcess() {
            const val = document.getElementById('rawInput').value;
            const out = document.getElementById('outputRes');
            out.innerHTML = "";
            if(val.trim() === "") { document.getElementById('btn-copy').classList.add('hidden'); return; }
            
            val.split('\n').forEach(line => {
                if(line.trim().length >= 8) {
                    out.innerHTML += `<span class="codigo-tag">${line.trim().slice(-8)}</span>`;
                }
            });
            document.getElementById('btn-copy').classList.remove('hidden');
        }

        function copyResult() {
            const codes = Array.from(document.querySelectorAll('.codigo-tag')).map(t => t.innerText).join(' ');
            navigator.clipboard.writeText(codes).then(() => {
                document.getElementById('rawInput').value = "";
                autoProcess();
                alert("Copiado al portapapeles");
            });
        }

        function startTools() {
            setInterval(() => { document.getElementById('reloj-mini').innerText = new Date().toLocaleTimeString(); }, 1000);
            let cal = "Abril 2026<br>D L M M J V S<br>";
            for(let i=1; i<=30; i++) cal += (i===13 ? `<b style="color:var(--accent)">13</b> ` : i+" ");
            document.getElementById('cal-mini').innerHTML = cal;
        }
    </script>
</body>
</html>

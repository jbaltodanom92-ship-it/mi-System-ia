<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - Jose Alfredo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #03080f; --card: #0d1117; --accent: #00f2ff; --panel: #161b22; --error: #ff4b4b; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.1; }

        .app-shell {
            width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        /* LOGIN SEGÚN CAPTURA */
        .login-card { 
            width: 450px; background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 40px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .avatar-box { width: 150px; height: 150px; border: 1px solid #30363d; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .avatar-box i { font-size: 5rem; color: #1f4b5e; }
        .asis-text { color: var(--accent); font-style: italic; font-size: 0.9rem; min-height: 1.2em; }
        .asis-text.error { color: var(--error); }
        .login-input { width: 100%; background: #010409; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; outline: none; box-sizing: border-box; }

        /* PANEL DE TRABAJO VERTICAL */
        .work-panel {
            width: 400px; max-height: 85vh; background: var(--card); border: 1px solid #30363d; border-radius: 15px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .scroll-v { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .scroll-v::-webkit-scrollbar { width: 5px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        
        .nav-item { 
            background: var(--panel); border-left: 4px solid var(--accent); padding: 25px; 
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 20px; transition: 0.2s;
        }
        .nav-item:hover { background: #1c2128; transform: translateX(5px); }
        .nav-item i { font-size: 1.8rem; color: var(--accent); }

        /* EXTRACTOR SEGÚN CAPTURA */
        .extractor-container { 
            width: 900px; background: var(--card); border-radius: 12px; padding: 30px;
            display: flex; flex-direction: row; gap: 30px;
        }
        .left-tools { width: 220px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .right-work { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        
        textarea { 
            width: 100%; height: 150px; background: #010409; border: 1px solid #30363d; 
            color: var(--accent); padding: 15px; border-radius: 6px; resize: none; font-family: monospace; box-sizing: border-box;
        }
        #btn-extract { background: #2f81f7; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #btn-copy { background: #238636; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; }
        #btn-back { background: #30363d; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; width: 100%; }

        /* CALENDARIO Y RELOJ */
        .clock-ring { position: relative; width: 140px; height: 140px; }
        #time-digital { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); font-weight: bold; }
        .cal-mini { background: #000; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 100%; font-size: 0.75rem; line-height: 1.5; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="app-shell">
        <div id="view-login" class="login-card">
            <h2 style="color: var(--accent); margin-top: 0;">SISTEMA DE SEGURIDAD</h2>
            <div class="avatar-box"><i class="fa-solid fa-user-gear"></i></div>
            <div id="asis-msg" class="asis-text">IA: Ingrese su identificación.</div>
            <input type="text" id="user-in" class="login-input" placeholder="Usuario" onkeypress="checkUser(event)">
            <input type="password" id="pin-in" class="login-input hidden" placeholder="PIN" oninput="checkPin(this.value)">
        </div>

        <div id="view-panel" class="work-panel hidden">
            <h3 style="color: var(--accent); text-align: center; margin: 20px 0;">Panel de Trabajo</h3>
            <div class="scroll-v">
                <div class="nav-item" onclick="showExtractor()"><i class="fa-solid fa-code"></i><span>Extractor de Código Kohl's</span></div>
                <div class="nav-item"><i class="fa-solid fa-file-medical"></i><span>QA Reports Weekly Issues</span></div>
                <div class="nav-item"><i class="fa-solid fa-cake-candles"></i><span>Cumpleañeros</span></div>
                <div class="nav-item"><i class="fa-solid fa-user-shield"></i><span>Usuarios</span></div>
                <div class="nav-item"><i class="fa-solid fa-gears"></i><span>Configuración</span></div>
            </div>
        </div>

        <div id="view-extractor" class="extractor-container hidden">
            <div class="left-tools">
                <div class="clock-ring">
                    <canvas id="clock" width="140" height="140"></canvas>
                    <div id="time-digital">00:00:00</div>
                </div>
                <div id="cal-render" class="cal-mini"></div>
                <button id="btn-back" onclick="showPanel()">Volver al Menú Principal</button>
            </div>
            <div class="right-work">
                <h3 style="color: var(--accent); text-align: center; margin: 0;">Extractor de Código Kohl's</h3>
                <textarea id="raw-data" placeholder="Pega los códigos aquí..."></textarea>
                <button id="btn-extract" onclick="process()">Extraer Código</button>
                <p style="color: var(--accent); font-size: 0.8rem; margin: 0;">Códigos Procesados (8 dígitos):</p>
                <textarea id="output-data" readonly></textarea>
                <button id="btn-copy" onclick="copy()"><i class="fa-brands fa-whatsapp"></i> Copiar y Limpiar Todo</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN = "JBaltodano_Admin";
        const PIN = "404471";

        // LOGIN LÓGICA
        function checkUser(e) {
            if(e.key === 'Enter') {
                const v = document.getElementById('user-in').value;
                const m = document.getElementById('asis-msg');
                if(v === ADMIN) {
                    m.innerText = "IA: Usuario reconocido. Ingrese su PIN.";
                    m.classList.remove('error');
                    document.getElementById('user-in').classList.add('hidden');
                    document.getElementById('pin-in').classList.remove('hidden').focus();
                } else {
                    m.innerText = "IA Error: El usuario no es válido.";
                    m.classList.add('error');
                }
            }
        }

        function checkPin(v) {
            if(v.length === 6) {
                if(v === PIN) {
                    document.getElementById('view-login').classList.add('hidden');
                    showPanel();
                } else {
                    document.getElementById('asis-msg').innerText = "IA Error: PIN incorrecto.";
                    document.getElementById('asis-msg').classList.add('error');
                }
            }
        }

        function showPanel() {
            document.getElementById('view-extractor').classList.add('hidden');
            document.getElementById('view-panel').classList.remove('hidden');
        }

        function showExtractor() {
            document.getElementById('view-panel').classList.add('hidden');
            document.getElementById('view-extractor').classList.remove('hidden');
            startClock(); renderCal();
        }

        // LÓGICA EXTRACTOR
        function process() {
            const raw = document.getElementById('raw-data').value;
            const lines = raw.split('\n');
            let results = [];
            lines.forEach(l => {
                if(l.trim().length >= 8) results.push(l.trim().slice(-8));
            });
            document.getElementById('output-data').value = results.join('\n');
        }

        function copy() {
            const out = document.getElementById('output-data');
            navigator.clipboard.writeText(out.value.replace(/\n/g, ' '));
            document.getElementById('raw-data').value = "";
            out.value = "";
        }

        function renderCal() {
            // Abril 2026
            let html = `<b>Abril 2026</b><br>D L M M J V S<br>`;
            for(let i=1; i<=30; i++) {
                html += (i===13 ? `<span style="color:var(--accent)">13</span> ` : i + " ");
                if(i%7===0) html += "<br>";
            }
            document.getElementById('cal-render').innerHTML = html;
        }

        function startClock() {
            const ctx = document.getElementById('clock').getContext('2d');
            setInterval(() => {
                const now = new Date();
                ctx.clearRect(0,0,140,140);
                ctx.beginPath(); ctx.arc(70,70,65,0,2*Math.PI); ctx.strokeStyle="#161b22"; ctx.lineWidth=6; ctx.stroke();
                let p = (now.getSeconds()) / 60;
                ctx.beginPath(); ctx.arc(70,70,65,-Math.PI/2, -Math.PI/2 + (2*Math.PI*p));
                ctx.strokeStyle="#00f2ff"; ctx.lineWidth=6; ctx.stroke();
                document.getElementById('time-digital').innerText = now.toLocaleTimeString();
            }, 1000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema IA - Jose Alfredo B.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #03080f; --card: rgba(13, 17, 23, 0.98); --accent: #00f2ff; --text: #c9d1d9; --panel: #161b22;
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: var(--bg); color: var(--text); }
        
        /* MOTOR MATRIX CIAN */
        #canvasMatrix { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { 
            background: var(--card); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; 
            text-align: center; box-shadow: 0 0 40px rgba(0,242,255,0.25); 
            border: 1px solid #30363d; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            transition: all 0.5s ease;
        }

        /* PANEL DE TRABAJO COMPLETO */
        #menu-pestañas { width: 100%; height: 100%; overflow-y: auto; z-index: 10; position: relative; }
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px; padding: 40px; width: 90%; max-width: 1100px; margin: 80px auto 0 auto;
        }
        .tile {
            background: var(--panel); border-left: 5px solid var(--accent); border-radius: 12px; 
            padding: 30px; color: #fff; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.6); text-align: left;
        }
        .tile:hover { transform: translateY(-8px); box-shadow: 0 0 30px var(--accent); background: #1c2128; }
        .tile i { font-size: 2.2rem; color: var(--accent); margin-bottom: 20px; display: block; }
        .tile span { font-size: 1rem; font-weight: bold; line-height: 1.4; display: block; }

        /* INTERFAZ EXTRACTOR (BOCETO FIEL) */
        #entorno-trabajo { max-width: 900px; text-align: left; }
        .layout-extractor { display: flex; gap: 40px; align-items: flex-start; }
        .col-reloj { flex: 0 0 240px; text-align: center; }
        .col-main { flex: 1; display: flex; flex-direction: column; }
        
        #calendario-mini { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; font-size: 0.75rem; 
            margin-top: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid #30363d;
        }
        .dia-actual { background: var(--accent); color: #000; border-radius: 50%; font-weight: bold; width: 1.4rem; height: 1.4rem; margin: auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--accent); }
        
        textarea { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: #00f2ff; margin: 10px 0; font-family: 'Consolas', monospace; font-size: 0.9rem; resize: none; }
        button { width: 100%; background: #007bff; color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 1rem; }
        button:hover { filter: brightness(1.2); }
        .hidden { display: none !important; }
        
        /* TEXTO ASISTENTE */
        .asis-msg { font-style: italic; color: #8b949e; margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <canvas id="canvasMatrix"></canvas>

    <div id="login-flow" class="container">
        <h2 style="color: var(--accent); letter-spacing: 2px;">LOGIN IA</h2>
        <p id="asis-log" class="asis-msg">IA: Ingrese su usuario para validar permisos.</p>
        <input type="text" id="user-input" placeholder="Nombre de Usuario" oninput="validarUser(this.value)">
        <div id="step-pin" class="hidden">
            <input type="password" id="pin-input" placeholder="PIN de Seguridad" oninput="validarPin(this.value)">
            <button id="btn-login" class="hidden" onclick="iniciarSistema()">Acceder al Sistema</button>
        </div>
    </div>

    <div id="menu-pestañas" class="hidden">
        <h3 style="color: var(--accent); text-align:center; margin-top:70px; font-size: 2rem; text-transform: uppercase;">Panel de Trabajo</h3>
        <div class="grid-container">
            <div class="tile" onclick="abrirModulo('Extractor')">
                <i class="fa-solid fa-code"></i><span>Extractor de Codigo de Caja para Kohl's</span>
            </div>
            <div class="tile" onclick="abrirModulo('QA')">
                <i class="fa-solid fa-file-medical"></i><span>QA Reports for Weekly Issues</span>
            </div>
            <div class="tile" onclick="abrirModulo('Cumpleaños')">
                <i class="fa-solid fa-cake-candles"></i><span>Cumpleañeros</span>
            </div>
            <div class="tile" onclick="abrirModulo('Usuarios')">
                <i class="fa-solid fa-user-shield"></i><span>Usuarios</span>
            </div>
            <div class="tile" onclick="abrirModulo('Config')">
                <i class="fa-solid fa-gears"></i><span>Configuraciones</span>
            </div>
        </div>
        <div style="text-align:center; margin-top: 50px; padding-bottom: 50px;">
            <button style="background:#30363d; width:220px;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </div>

    <div id="entorno-trabajo" class="container hidden">
        <h3 id="modulo-titulo" style="color: var(--accent); text-align:center; margin-bottom: 30px;"></h3>
        
        <div id="contenido-dinamico">
            <div class="layout-extractor">
                <div class="col-reloj">
                    <canvas id="canvasReloj" width="140" height="140"></canvas>
                    <div id="hora-digital" style="color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-top: 15px; font-family: monospace;"></div>
                    
                    <div id="calendario-mini">
                        <b style="grid-column: span 7; color: var(--accent); margin-bottom:8px; font-size: 0.9rem;">Abril 2026</b>
                        <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
                        ${generarCalendario(13)}
                    </div>
                </div>

                <div class="col-main">
                    <textarea id="inputCodigo" placeholder="Pega los códigos aquí..." style="height: 160px;" oninput="controlBotonExtraer()"></textarea>
                    
                    <button id="btn-extraer" class="hidden" onclick="procesarExtraccion()">Extraer Código</button>
                    
                    <div id="res-box" class="hidden">
                        <p style="font-size: 0.8rem; color: var(--accent); margin: 20px 0 5px;">Códigos Procesados (8 dígitos):</p>
                        <textarea id="outputRes" readonly style="height: 120px; border: 1px solid #238636; background: #010409;"></textarea>
                        <button onclick="copiarLimpiar()" style="background:#238636;">
                            <i class="fa-brands fa-whatsapp"></i> Copiar y Limpiar Todo
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <button style="background:#30363d; margin-top:30px;" onclick="volverMenu()">Volver al Menú Principal</button>
    </div>

    <script>
        // CONFIGURACIÓN DE USUARIO
        const USER_DATA = {
            id: "JBaltodano_Admin",
            pin: "404471",
            genero: "masculino" // Para la lógica de voz: Voz femenina para hombre
        };

        // --- LÓGICA DE LOGIN ---
        function validarUser(v) {
            if(v === USER_DATA.id) {
                document.getElementById('asis-log').innerText = "IA: Usuario reconocido. Ingrese su PIN.";
                document.getElementById('step-pin').classList.remove('hidden');
            }
        }
        function validarPin(p) {
            if(p === USER_DATA.pin) document.getElementById('btn-login').classList.remove('hidden');
        }
        function iniciarSistema() {
            document.getElementById('login-flow').classList.add('hidden');
            document.getElementById('menu-pestañas').classList.remove('hidden');
        }

        // --- NAVEGACIÓN DE MÓDULOS ---
        function abrirModulo(tipo) {
            document.getElementById('menu-pestañas').classList.add('hidden');
            document.getElementById('entorno-trabajo').classList.remove('hidden');
            
            if(tipo === 'Extractor') {
                document.getElementById('modulo-titulo').innerText = "Extractor de Código Kohl's";
                iniciarReloj();
            } else {
                document.getElementById('contenido-dinamico').innerHTML = `<p style="text-align:center; padding: 40px;">Módulo de ${tipo} en construcción bajo protocolos IA...</p>`;
            }
        }

        function volverMenu() {
            document.getElementById('entorno-trabajo').classList.add('hidden');
            document.getElementById('menu-pestañas').classList.remove('hidden');
        }

        // --- LÓGICA DEL EXTRACTOR ---
        function controlBotonExtraer() {
            const hasText = document.getElementById('inputCodigo').value.trim().length > 0;
            document.getElementById('btn-extraer').classList.toggle('hidden', !hasText);
        }

        function procesarExtraccion() {
            const input = document.getElementById('inputCodigo').value;
            // Extraer últimos 8 caracteres de cada línea que tenga al menos 8
            const lineas = input.split('\n');
            const resultados = lineas
                .filter(l => l.trim().length >= 8)
                .map(l => l.trim().slice(-8))
                .join('\n');
            
            document.getElementById('outputRes').value = resultados;
            document.getElementById('res-box').classList.remove('hidden');
        }

        function copiarLimpiar() {
            const out = document.getElementById('outputRes');
            navigator.clipboard.writeText(out.value).then(() => {
                alert("Copiado al portapapeles con éxito.");
                // Limpieza total y vuelta al principio del módulo
                document.getElementById('inputCodigo').value = "";
                document.getElementById('res-box').classList.add('hidden');
                document.getElementById('btn-extraer').classList.add('hidden');
            });
        }

        // --- RELOJ PROGRESIVO Y ALARMAS ---
        function iniciarReloj() {
            const canvas = document.getElementById('canvasReloj');
            const ctx = canvas.getContext('2d');
            
            setInterval(() => {
                const ahora = new Date();
                ctx.clearRect(0,0,140,140);
                
                // Círculo de fondo
                ctx.beginPath(); ctx.arc(70,70,60,0,2*Math.PI);
                ctx.strokeStyle="#161b22"; ctx.lineWidth=10; ctx.stroke();
                
                // Círculo de progreso (Jornada 8am - 5pm = 9 horas)
                let inicio = 8;
                let actualDecimal = ahora.getHours() + ahora.getMinutes()/60 + ahora.getSeconds()/3600;
                let progreso = (actualDecimal - inicio) / 9;
                progreso = Math.min(Math.max(progreso, 0), 1);
                
                ctx.beginPath();
                ctx.arc(70,70,60, -Math.PI/2, (-Math.PI/2) + (2*Math.PI*progreso));
                ctx.strokeStyle = varColor(progreso); ctx.lineWidth=10; ctx.lineCap = "round"; ctx.stroke();
                
                document.getElementById('hora-digital').innerText = ahora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                
                // Lógica de Alarmas (15 min antes de Almuerzo y Salida)
                checkAlarmas(ahora);
            }, 1000);
        }

        function varColor(p) { return p < 0.8 ? "#00f2ff" : "#ffca28"; }

        function checkAlarmas(t) {
            const h = t.getHours(); const m = t.getMinutes(); const s = t.getSeconds();
            // Almuerzo (Suponiendo 12:00, alarma 11:45)
            if(h === 11 && m === 45 && s === 0) hablar("Jose, faltan quince minutos para tu hora de almuerzo.");
            // Salida (5:00 PM = 17:00, alarma 16:45)
            if(h === 16 && m === 45 && s === 0) hablar("Atención, faltan quince minutos para finalizar tu jornada laboral.");
        }

        function hablar(msj) {
            const u = new SpeechSynthesisUtterance(msj);
            // Voz femenina si el usuario es hombre
            u.lang = 'es-MX';
            const voces = window.speechSynthesis.getVoices();
            const vozFemenina = voces.find(v => v.name.includes("Google") && v.name.includes("Spanish") && (v.name.includes("female") || v.gender === "female"));
            if(vozFemenina) u.voice = vozFemenina;
            window.speechSynthesis.speak(u);
        }

        // --- MOTOR MATRIX ---
        const matrix = document.getElementById("canvasMatrix");
        const mctx = matrix.getContext("2d");
        function rez() { matrix.width = window.innerWidth; matrix.height = window.innerHeight; }
        window.onresize = rez; rez();
        const chars = "010101010101CODE-IA-EXTRACTOR";
        const fSize = 16;
        const columns = Array(Math.floor(matrix.width/fSize)).fill(1);
        function drawMatrix() {
            mctx.fillStyle = "rgba(3, 8, 15, 0.15)"; mctx.fillRect(0,0,matrix.width,matrix.height);
            mctx.fillStyle = "#00f2ff25"; mctx.font = fSize + "px monospace";
            columns.forEach((y, i) => {
                const txt = chars[Math.floor(Math.random()*chars.length)];
                mctx.fillText(txt, i*fSize, y*fSize);
                if(y*fSize > matrix.height && Math.random() > 0.98) columns[i] = 0;
                columns[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        function generarCalendario(dia) {
            let h = "";
            for(let i=1; i<=30; i++) {
                h += `<span class="${i===dia?'dia-actual':''}">${i}</span>`;
            }
            return h;
        }
        
        // Inyectar el calendario al cargar
        document.addEventListener('DOMContentLoaded', () => {
            const cal = document.getElementById('calendario-mini');
            if(cal) {
                // El contenido ya se genera dinámicamente en el innerHTML del módulo
            }
        });
    </script>
</body>
</html>

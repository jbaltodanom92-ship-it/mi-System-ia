<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema JB - IA Master Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #02060a; --accent: #00f2ff; --win-blue: #0078d7; --card: #0d1117; --error: #ffeb3b; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; touch-action: manipulation; }
        .view { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: absolute; transition: 0.5s Ease; }
        .hidden { opacity: 0 !important; pointer-events: none !important; transform: scale(0.98) !important; }
        .display-none { display: none !important; }

        /* LOGIN IA */
        .login-card { width: 550px; display: flex; align-items: center; gap: 25px; background: rgba(255,255,255,0.02); padding: 40px; border: 1px solid #1a2026; border-radius: 12px; }
        .avatar-frame { width: 140px; height: 140px; border: 1px solid #30363d; display: flex; align-items: center; justify-content: center; background: #010409; overflow: hidden; }
        .avatar-frame i { font-size: 4.5rem; color: #1f4b5e; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .input-group { position: relative; width: 100%; }
        input { width:100%; padding:14px; background:#0d1117; color:white; border:1px solid #30363d; border-radius: 4px; font-size: 1rem; outline: none; box-sizing: border-box; }
        .toggle-pin { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #444; cursor: pointer; transition: 0.3s; }
        .toggle-pin.active { color: var(--accent); }

        /* PANEL METRO */
        .metro-grid { display: grid; grid-template-columns: repeat(4, 160px); gap: 12px; }
        .tile { position: relative; width: 160px; height: 160px; background: var(--win-blue); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .tile:hover { transform: scale(1.05); border: 1px solid var(--accent); box-shadow: 0 0 20px var(--accent); z-index: 10; }
        .tile.wide { width: 332px; grid-column: span 2; }
        .tile span { position: absolute; bottom: 10px; left: 10px; font-size: 0.75rem; font-weight: bold; }

        /* EXTRACTOR BLINDADO */
        .ext-container { width: 1050px; display: flex; gap: 25px; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #1a2026; }
        .side-tools { width: 280px; display: flex; flex-direction: column; align-items: center; gap: 20px; border-right: 1px solid #30363d; padding-right: 20px; }
        .progress-box { position: relative; width: 170px; height: 170px; display: flex; align-items: center; justify-content: center; }
        .prog-canvas { position: absolute; transform: rotate(-90deg); }
        .clock-num { font-size: 1.6rem; font-weight: bold; color: var(--accent); }
        textarea { width: 100%; height: 140px; background: white; color: black; border: none; padding: 15px; font-family: 'Consolas', monospace; border-radius: 4px; resize: none; box-sizing: border-box; }
        #txt-out { height: 70px; background: #010409; color: var(--accent); border: 1px solid #1a2026; }
        .btn-win { width: 100%; padding: 14px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-blue { background: #0078d7; color: white; }
        .btn-green { background: #238636; color: white; }

        /* CALENDARIO DIN?MICO */
        .today-circle { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
        .today-svg { position: absolute; transform: rotate(-90deg); width: 26px; height: 26px; }

        /* IA PROMPT DECISI?N */
        .ia-decision-box { display: flex; gap: 10px; margin-top: 10px; }
        .btn-mini { padding: 5px 15px; font-size: 0.8rem; cursor: pointer; border-radius: 4px; border: 1px solid var(--accent); background: none; color: white; transition: 0.3s; }
        .btn-mini:hover { background: var(--accent); color: black; }
    </style>
</head>
<body onmousemove="resetInactivity()" ontouchstart="resetInactivity()" onkeydown="resetInactivity()">

    <div id="v-login" class="view">
        <div class="login-card">
            <div class="avatar-frame">
                <i class="fa-solid fa-robot" id="bot-icon"></i>
                <img id="user-photo" src="https://i.imgur.com/8Km9tLL.png" class="hidden">
            </div>
            <div style="flex-grow: 1;">
                <h2 style="color: var(--accent); margin: 0 0 10px 0;">SEGURIDAD JB</h2>
                <div id="asis-msg" style="background: rgba(0,242,255,0.1); border: 1px solid var(--accent); padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem;">IA: Ingrese su identificaci?n.</div>
                
                <input type="text" id="u-in" placeholder="Usuario" oninput="iaIdentify(this.value)">
                
                <div id="pin-container" class="input-group hidden display-none">
                    <input type="password" id="p-in" placeholder="PIN" oninput="iaAuth(this.value)">
                    <i class="fa-solid fa-eye toggle-pin" id="pin-eye" onclick="togglePinSee()"></i>
                </div>

                <div id="ia-prompt" class="hidden display-none">
                    <p style="font-size:0.8rem; margin:10px 0; color:var(--error);">¿Deseas asistencia de IT?</p>
                    <div class="ia-decision-box">
                        <button class="btn-mini" onclick="enableITSupport()">S?</button>
                        <button class="btn-mini" onclick="closeIAPrompt()">NO</button>
                    </div>
                </div>

                <button id="it-support" class="btn-win btn-blue hidden display-none" style="margin-top:15px;" onclick="sendITWhatsApp()">
                    <i class="fa-brands fa-whatsapp"></i> Contactar Admin IT
                </button>
            </div>
        </div>
    </div>

    <div id="v-welcome" class="view hidden">
        <div style="width: 80%;">
            <h1 style="font-size: 3.5rem; font-weight: 100; margin: 0;">Hola, <span id="user-name"></span></h1>
            <div id="ia-family-news" style="margin-top: 20px; padding: 20px; border-left: 4px solid var(--accent); background: rgba(0,242,255,0.05);"></div>
            <button class="btn-win btn-blue" style="width: 220px; margin-top: 30px;" onclick="showView('v-panel')">CONTINUAR</button>
        </div>
    </div>

    <div id="v-panel" class="view hidden" style="flex-direction: column; align-items: flex-start; padding-left: 80px;">
        <h2 style="font-weight: 100; font-size: 3rem; margin-bottom: 25px;">Inicio</h2>
        <div class="metro-grid">
            <div class="tile wide" style="background:#00a4ef" onclick="showView('v-ext'); initEngine();">
                <i class="fa-solid fa-bolt"></i><span>Extractor Master</span>
            </div>
            <div class="tile" style="background:#7fba00"><i class="fa-solid fa-gear"></i><span>Sistemas</span></div>
            <div class="tile" style="background:#744da9"><i class="fa-solid fa-cake-candles"></i><span>Familia</span></div>
            <div class="tile" style="background:#f25022" onclick="location.reload()"><i class="fa-solid fa-power-off"></i><span>Salir</span></div>
        </div>
    </div>

    <div id="v-ext" class="view hidden">
        <div class="ext-container">
            <div class="side-tools">
                <div class="progress-box">
                    <canvas id="progCanvas" width="170" height="170" class="prog-canvas"></canvas>
                    <div style="text-align: center; z-index: 5;">
                        <div id="d-time" class="clock-num">00:00:00</div>
                        <div id="alarm-info" style="color:var(--error); font-weight:bold; font-size:0.75rem;"></div>
                    </div>
                </div>
                <div id="cal-ui" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:6px; width:100%;"></div>
                <button class="btn-win" style="background:#333;" onclick="showView('v-panel')">VOLVER</button>
            </div>
            <div style="flex-grow:1; display:flex; flex-direction:column; gap:12px;">
                <h3 style="color:var(--accent); margin:0;">Herramienta de Extracci?n Blindada</h3>
                <textarea id="raw-in" placeholder="Pegue la lista aqu?..." oninput="toggleRun()"></textarea>
                <button id="btn-run" class="btn-win btn-blue hidden display-none" onclick="processX()">EXTRAER ?LTIMOS 8 D?GITOS</button>
                <div id="out-box" class="hidden display-none">
                    <textarea id="txt-out" readonly></textarea>
                    <button class="btn-win btn-green" style="margin-top:10px;" onclick="copyFinish()"><i class="fa-brands fa-whatsapp"></i> COPIAR HORIZONTAL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeUser = "";
        let typingTimer;
        const BD_AUTH = { "JBaltodano_Admin": "404471" };
        const BD_FAMILIA = [
            { n: "Hilda (Mam?)", m: 1, d: 27 },
            { n: "Hija", m: 0, d: 15 }
        ];

        function resetInactivity() {
            clearTimeout(typingTimer);
            if(!document.getElementById('v-login').classList.contains('hidden')) {
                typingTimer = setTimeout(iaCheckStatus, 2000); 
            }
        }

        function iaCheckStatus() {
            const uVal = document.getElementById('u-in').value;
            const pVal = document.getElementById('p-in').value;

            if(activeUser === "" && uVal.length > 0 && !BD_AUTH[uVal]) {
                showIAPrompt("IA: No reconozco ese usuario. ¿Necesitas ayuda?");
            } 
            else if (activeUser !== "" && pVal.length > 0 && pVal !== BD_AUTH[activeUser]) {
                showIAPrompt("IA: Parece que el PIN no es correcto. ¿Deseas asistencia?");
            }
        }

        function showIAPrompt(msg) {
            document.getElementById('asis-msg').innerText = msg;
            document.getElementById('ia-prompt').classList.remove('hidden', 'display-none');
        }

        function cleanAsisUI() {
            document.getElementById('ia-prompt').classList.add('hidden', 'display-none');
            document.getElementById('it-support').classList.add('hidden', 'display-none');
        }

        function enableITSupport() {
            document.getElementById('ia-prompt').classList.add('hidden', 'display-none');
            document.getElementById('it-support').classList.remove('hidden', 'display-none');
            document.getElementById('asis-msg').innerText = "IA: Soporte habilitado. Dale clic al bot?n azul.";
        }

        function closeIAPrompt() {
            document.getElementById('ia-prompt').classList.add('hidden', 'display-none');
            document.getElementById('asis-msg').innerText = "IA: Reintente su c?digo.";
        }

        function togglePinSee() {
            const p = document.getElementById('p-in');
            const eye = document.getElementById('pin-eye');
            if(p.type === "password") {
                p.type = "text";
                eye.classList.add('active');
            } else {
                p.type = "password";
                eye.classList.remove('active');
            }
        }

        function iaIdentify(val) {
            resetInactivity();
            cleanAsisUI();
            document.getElementById('asis-msg').innerText = "IA: Ingrese su identificaci?n.";

            if(BD_AUTH[val]) {
                activeUser = val;
                document.getElementById('asis-msg').innerText = "IA: Identidad confirmada. Ingrese PIN.";
                document.getElementById('bot-icon').classList.add('hidden');
                document.getElementById('user-photo').classList.remove('hidden');
                document.getElementById('u-in').classList.add('hidden');
                
                // MEJORA: Mostrar contenedor y dar FOCO autom?tico
                const pCont = document.getElementById('pin-container');
                pCont.classList.remove('hidden', 'display-none');
                document.getElementById('p-in').focus();
            }
        }

        function iaAuth(val) {
            resetInactivity();
            cleanAsisUI();
            document.getElementById('asis-msg').innerText = "IA: Validando PIN...";

            if(val === BD_AUTH[activeUser]) {
                document.getElementById('user-name').innerText = "Jose Alfredo";
                showView('v-welcome');
                iaFamilyLogic();
            } 
            else if (val.length >= 6) {
                showIAPrompt("IA: PIN incorrecto.");
            }
        }

        function sendITWhatsApp() {
            const msg = "Hola Jose Alfredo, necesito ayuda con mi acceso al sistema JB.";
            window.open(`https://wa.me/50584386180?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function iaFamilyLogic() {
            const now = new Date();
            const box = document.getElementById('ia-family-news');
            let html = `<p><i class="fa-solid fa-robot"></i> <strong>IA:</strong> Analizando agenda familiar...</p>`;
            let found = false;
            BD_FAMILIA.forEach(f => {
                const bday = new Date(now.getFullYear(), f.m, f.d);
                const diff = Math.ceil((bday - now) / (1000*60*60*24));
                if(now.getMonth() === f.m && now.getDate() === f.d) {
                    html += `<p style="color:var(--accent); font-weight:bold;">¡HOY! Es el cumplea?os de ${f.n}.</p>`;
                    found = true;
                } else if(diff > 0 && diff <= 10) {
                    html += `<p style="color:var(--error);">PRONTO: El cumplea?os de ${f.n} es en ${diff} d?as.</p>`;
                    found = true;
                }
            });
            if(!found) html += `<p>No hay eventos pr?ximos.</p>`;
            box.innerHTML = html;
        }

        function initEngine() {
            const ctx = document.getElementById('progCanvas').getContext('2d');
            setInterval(() => {
                const now = new Date();
                const h = now.getHours(), m = now.getMinutes(), day = now.getDay();
                document.getElementById('d-time').innerText = now.toLocaleTimeString();
                let start = 7, end = (day >= 2 && day <= 4) ? 18 : 17;
                ctx.clearRect(0,0,170,170);
                ctx.beginPath(); ctx.arc(85,85,80,0,2*Math.PI); ctx.strokeStyle="#1a2026"; ctx.lineWidth=8; ctx.stroke();
                let p = 0;
                if(h >= start && h < end) p = ((h-start)*3600 + m*60) / ((end-start)*3600);
                else if(h >= end) p = 1;
                ctx.beginPath(); ctx.arc(85,85,80,0,p*2*Math.PI); ctx.strokeStyle="#00f2ff"; ctx.lineWidth=8; ctx.stroke();
                if(h === end && m === 0) document.getElementById('alarm-info').innerText = "FIN DE JORNADA";
                drawCal(p);
            }, 1000);
            drawCal(0);
        }

        function toggleRun() {
            const val = document.getElementById('raw-in').value.trim();
            document.getElementById('btn-run').className = val ? "btn-win btn-blue" : "display-none";
        }

        function processX() {
            const raw = document.getElementById('raw-in').value.split('\n');
            const clean = raw.map(l => l.trim()).filter(l => l.length >= 8).map(l => l.slice(-8));
            document.getElementById('txt-out').value = clean.join(' ');
            document.getElementById('out-box').classList.remove('hidden', 'display-none');
        }

        function copyFinish() {
            navigator.clipboard.writeText(document.getElementById('txt-out').value);
            document.getElementById('raw-in').value = "";
            document.getElementById('out-box').classList.add('hidden', 'display-none');
            toggleRun();
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function drawCal(progress) {
            const d = new Date();
            const dash = progress * 75;
            let html = `<div style="text-align:center; color:var(--accent); font-weight:bold; font-size:0.8rem; margin-bottom:5px;">ABRIL 2026</div><div style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:0.7rem;">`;
            html += "DLMMJVS".split('').map(l => `<span>${l}</span>`).join('');
            for(let i=1; i<=30; i++) {
                if(i === d.getDate()) {
                    html += `<span class="today-circle"><svg class="today-svg" viewBox="0 0 30 30"><circle cx="15" cy="15" r="12" fill="none" stroke="#1a2026" stroke-width="2"/><circle cx="15" cy="15" r="12" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="${dash} 75" /></svg><b style="color:var(--accent); position:relative; z-index:2;">${i}</b></span>`;
                } else { html += `<span>${i}</span>`; }
            }
            html += "</div>";
            document.getElementById('cal-ui').innerHTML = html;
        }
    </script>
</body>
</html>
